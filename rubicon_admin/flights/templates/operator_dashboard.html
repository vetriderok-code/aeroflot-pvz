<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <title>Сводная по отряду</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- operator-ui: 20260621h senior-center scroll-slow -->
    {% include 'includes/navigation_head.html' %}
    <link rel="stylesheet" href="{% static 'css/operator-dashboard.css' %}?v=20260621h">
    <link rel="stylesheet" href="{% static 'css/tv-mode.css' %}?v=20260621h">
    <style>
        .dash-toolbar--centered {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 22px 24px;
        }
        .dash-toolbar--centered .dash-toolbar__actions--start {
            grid-column: 1;
            justify-self: start;
        }
        .dash-toolbar--centered .dash-toolbar__title {
            grid-column: 2;
            margin: 0;
            text-align: center;
            font-size: 40px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
            line-height: 1.15;
        }
        .dash-toolbar--centered .dash-status__clock {
            grid-column: 3;
            justify-self: end;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
        }
        .operators-tv-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #ffb74d;
            background: rgba(255, 152, 0, 0.15);
            color: #ffcc80;
            font-weight: 600;
            border-radius: 10px;
        }
        .operators-tv-btn:hover {
            background: rgba(255, 152, 0, 0.28);
        }
        .operators-tv-btn[aria-pressed="true"] {
            background: linear-gradient(145deg, #ff9800, #f57c00);
            color: #1a1000;
        }
        .operators-tv-btn--floating {
            position: fixed;
            top: 72px;
            right: 20px;
            z-index: 10050;
            padding: 12px 20px;
            font-size: 16px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
            transition: opacity 0.25s ease;
        }
        html.tv-mode body.page-operators .operators-tv-btn--floating[aria-pressed="true"] {
            opacity: 0;
        }
        html.tv-mode body.page-operators .operators-tv-btn--floating[aria-pressed="true"]:hover,
        html.tv-mode body.page-operators .operators-tv-btn--floating[aria-pressed="true"]:focus-visible {
            opacity: 1;
        }
        .board__top .col-icon {
            display: inline-block;
            margin-right: 6px;
            font-size: 1.2em;
            vertical-align: -0.08em;
        }
        html.tv-mode body.page-operators {
            overflow: hidden !important;
            height: 100vh !important;
            margin: 0 !important;
        }
        html.tv-mode body.page-operators .main-content {
            height: 100vh !important;
            max-width: none !important;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden !important;
            display: flex !important;
            flex-direction: column !important;
            min-height: 0 !important;
        }
        html.tv-mode body.page-operators #operatorsShell,
        html.tv-mode body.page-operators .dashboard-shell {
            display: flex !important;
            flex-direction: column !important;
            flex: 1 1 auto !important;
            min-height: 0 !important;
            height: auto !important;
            max-height: 100% !important;
            overflow: hidden !important;
            border: none !important;
            border-radius: 0 !important;
        }
        html.tv-mode body.page-operators #operatorsShell:fullscreen,
        html.tv-mode body.page-operators #operatorsShell:-webkit-full-screen {
            height: 100% !important;
            width: 100%;
        }
        html.tv-mode body.page-operators .dash-toolbar {
            flex: 0 0 auto !important;
            position: relative !important;
            z-index: 3 !important;
        }
        html.tv-mode body.page-operators #operatorsTvScroll {
            flex: 1 1 auto !important;
            min-height: 0 !important;
            position: relative !important;
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden !important;
        }
        html.tv-mode body.page-operators #operatorsTvScroll.operators-tv-scroll--manual {
            overflow-x: hidden !important;
            overflow-y: auto !important;
            scrollbar-width: thin;
            scrollbar-color: #ff9800 #1a1a1a;
        }
        html.tv-mode body.page-operators #operatorsTvInner {
            display: block !important;
            overflow: visible !important;
            height: auto !important;
            padding: 0 !important;
            margin: 0 !important;
            will-change: transform;
        }
        html.tv-mode body.page-operators .tv-scroll-anchor {
            height: 1px;
            width: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body class="page-operators" data-page="operators">
{% include 'includes/navigation.html' %}
<button type="button" class="tv-mode-btn operators-tv-btn operators-tv-btn--floating" id="btnTvMode" title="Крупный интерфейс для телевизора" aria-pressed="false">
    <span aria-hidden="true">📺</span>
    <span class="tv-mode-btn__label">Режим ТВ</span>
</button>
<div class="main-content">
    <div id="operatorsShell" class="dashboard-shell">
        <header class="dash-toolbar dash-toolbar--centered">
            <h1 class="dash-toolbar__title">Сводная по отряду</h1>
            <div class="dash-status__clock" id="mskClock">—</div>
        </header>
        <div id="loading" class="loading">Загрузка…</div>
        <div id="error" class="error-state" style="display:none;">Ошибка загрузки данных</div>
        <div class="operators-scroll-area dashboard-body" id="operatorsTvScroll">
            <div id="operatorsTvInner" class="operators-board" style="display:none;"></div>
        </div>
    </div>
</div>
<script>
    const REFRESH_MS = 15000;
    let dashboardLoadedOnce = false;
    let dashboardFetchFailures = 0;
    let dashboardFetchWarned = false;
    let commLinkChoices = [];
    let activePilots = new Set();
    let lastBoardSignature = '';

    function updateMskClock() {
        const el = document.getElementById('mskClock');
        if (!el) return;
        const fmt = new Intl.DateTimeFormat('ru-RU', {
            timeZone: 'Europe/Moscow',
            weekday: 'short',
            day: '2-digit',
            month: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
        });
        el.textContent = fmt.format(new Date()) + ' МСК';
    }

    function esc(s) {
        return String(s ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function isPilotFlying(callsign) {
        return activePilots.has((callsign || '').trim());
    }

    function pilotCellDay(op) {
        if (!op) {
            return '<td class="cell-empty day-sep">—</td><td class="cell-empty">—</td><td class="cell-empty">—</td>';
        }
        const flying = isPilotFlying(op.callsign);
        const flyingClass = flying ? ' cell-name--flying' : '';
        const dot = flying ? '<span class="pilot-flying-dot" aria-hidden="true"></span>' : '';
        return `
            <td class="cell-name cell-name--day day-sep${flyingClass}" data-callsign="${esc(op.callsign)}">${dot}${esc(op.callsign)}</td>
            <td class="cell-equip">${esc(op.drone_type || '—')}</td>
            <td class="cell-time">${esc(op.schedule || '—')}</td>
        `;
    }

    function pilotCellNight(op) {
        if (!op) {
            return '<td class="cell-empty">—</td><td class="cell-empty">—</td><td class="cell-empty night-sep">—</td>';
        }
        const flying = isPilotFlying(op.callsign);
        const flyingClass = flying ? ' cell-name--flying' : '';
        const dot = flying ? '<span class="pilot-flying-dot" aria-hidden="true"></span>' : '';
        return `
            <td class="cell-time">${esc(op.schedule || '—')}</td>
            <td class="cell-equip">${esc(op.drone_type || '—')}</td>
            <td class="cell-name cell-name--night night-sep${flyingClass}" data-callsign="${esc(op.callsign)}">${dot}${esc(op.callsign)}</td>
        `;
    }

    function otrCell(content = '') {
        return `<td class="cell-otr-col">${content}</td>`;
    }

    function parseSettlementName(raw) {
        let text = String(raw || '').trim();
        if (!text) return '';
        return text.replace(/^н\.?\s*п\.?\s*/i, '').trim();
    }

    function parsePositionName(raw) {
        let text = String(raw || '').trim();
        if (!text) return '';
        return text.replace(/^поз\.?\s*/i, '').trim();
    }

    function resolveLocationParts(loc) {
        let settlementName = parseSettlementName(loc.location_settlement);
        let positionName = parsePositionName(loc.location_position);
        if (!settlementName && !positionName && loc.location_display) {
            const display = String(loc.location_display).trim();
            const match = display.match(/^(.+?)\s*\(поз\.\s*(.+?)\)\s*$/i);
            if (match) {
                settlementName = parseSettlementName(match[1]);
                positionName = parsePositionName(match[2]);
            } else {
                settlementName = parseSettlementName(display);
            }
        }
        return { settlementName, positionName };
    }

    function renderLocationLabel(loc) {
        const { settlementName, positionName } = resolveLocationParts(loc);
        if (!settlementName && !positionName) return '—';

        let html = '<span class="loc-label">';
        if (settlementName) {
            html += '<span class="loc-label__prefix">н.п.</span> ';
            html += `<span class="loc-label__value">${esc(settlementName)}</span>`;
        }
        if (positionName) {
            html += '<span class="loc-label__pos-wrap"> (<span class="loc-label__prefix">позиция</span> ';
            html += `<span class="loc-label__value loc-label__value--pos">${esc(positionName)}</span>)</span>`;
        }
        html += '</span>';
        return html;
    }

    function renderCommLink(loc) {
        const labels = Array.isArray(loc.comm_link_labels) && loc.comm_link_labels.length
            ? loc.comm_link_labels
            : (Array.isArray(loc.comm_links) ? loc.comm_links : [])
                .map((value) => commLinkChoices.find((c) => c.value === value)?.label)
                .filter(Boolean);
        if (!labels.length) return '';
        return `
            <span class="loc-comm">
                <span class="loc-label__prefix">· связь</span>
                <span class="loc-comm__value">${labels.map(esc).join(', ')}</span>
            </span>
        `;
    }

    function renderLocationCell(loc) {
        return `<div class="loc-cell">${renderLocationLabel(loc)}${renderCommLink(loc)}</div>`;
    }

    function formatDetachmentPilot(op) {
        const note = (op.notes || '').trim();
        const noteHtml = note ? ` <span class="det-loc-inline">(${esc(note)})</span>` : '';
        const flying = isPilotFlying(op.callsign);
        const cls = flying ? 'det-pilot det-pilot--flying' : 'det-pilot';
        const dot = flying ? '<span class="pilot-flying-dot" aria-hidden="true"></span>' : '';
        return `<span class="${cls}" data-callsign="${esc(op.callsign)}">${dot}${esc(op.callsign)}${noteHtml}</span>`;
    }

    function pilotCellOtr(row) {
        const group = row?.detachment_group;
        if (Array.isArray(group) && group.length) {
            const content = group.map(formatDetachmentPilot).join('<span class="det-sep"> · </span>');
            return otrCell(`<div class="otr-group">${content}</div>`);
        }
        const op = row?.detachment;
        if (!op) {
            return otrCell('');
        }
        return otrCell(formatDetachmentPilot(op));
    }

    function renderSectionRows(section) {
        const senior = (section.senior_callsign || '').trim();
        let html = '';
        if (senior) {
            const seniorEsc = esc(senior);
            html += `
                <tr class="row-senior">
                    <td colspan="7">${seniorEsc}</td>
                </tr>
            `;
        }
        for (const loc of section.locations || []) {
            const hasLocationLabel = !loc.is_detachment_only && (
                loc.location_display
                || loc.location_settlement
                || loc.location_position
            );
            if (hasLocationLabel) {
                const locHtml = renderLocationCell(loc);
                html += `
                    <tr class="row-location">
                        <td colspan="3">${locHtml}</td>
                        ${otrCell()}
                        <td colspan="3">${locHtml}</td>
                    </tr>
                `;
            }
            (loc.rows || []).forEach((row, idx) => {
                const alt = idx % 2 === 1 ? ' row-pilot--alt' : ' row-pilot--fill';
                const detClass = row.detachment ? ' row-pilot--det' : '';
                html += `<tr class="row-pilot${alt}${detClass}">`;
                html += pilotCellDay(row.day);
                html += pilotCellOtr(row);
                html += pilotCellNight(row.night);
                html += '</tr>';
            });
        }
        html += '<tr class="block-gap"><td colspan="7"></td></tr>';
        return html;
    }

    const BOARD_COLGROUP = `
        <colgroup>
            <col><col><col><col><col><col><col>
        </colgroup>
    `;

    const BOARD_HEAD_HTML = `
        <thead>
            <tr class="board__top">
                <th colspan="3" class="col-title col-day"><span class="col-icon" aria-hidden="true">☀️</span> День</th>
                <th class="col-otr"><span class="col-icon" aria-hidden="true">🏠</span> Отрыв</th>
                <th colspan="3" class="col-title col-night"><span class="col-icon" aria-hidden="true">🌙☁️</span> Ночь</th>
            </tr>
            <tr class="board__sub">
                <th class="day-sep">Пилот</th>
                <th>Изделие</th>
                <th class="day-sep">Время</th>
                <th class="col-otr-sub">—</th>
                <th class="night-sep">Время</th>
                <th>Изделие</th>
                <th class="night-sep">Пилот</th>
            </tr>
        </thead>
    `;

    function renderBoard(board) {
        const sections = board?.sections || [];
        if (!sections.length) {
            return '<div class="empty-state">Нет операторов на дежурстве</div>';
        }

        let allRows = '';
        for (const section of sections) {
            allRows += renderSectionRows(section);
        }

        return `
            <table class="board">
                ${BOARD_COLGROUP}
                ${BOARD_HEAD_HTML}
                <tbody class="crew-block">${allRows}</tbody>
            </table>
            <div id="tvScrollAnchor" class="tv-scroll-anchor" aria-hidden="true"></div>
        `;
    }

    function boardStructureSignature(data) {
        const sections = data.board?.sections || [];
        return sections.map((section) => {
            const locPart = (section.locations || []).map((loc) => {
                const pilots = [];
                (loc.rows || []).forEach((row) => {
                    if (row.day?.callsign) pilots.push(row.day.callsign);
                    if (row.night?.callsign) pilots.push(row.night.callsign);
                    (row.detachment_group || []).forEach((op) => {
                        if (op?.callsign) pilots.push(op.callsign);
                    });
                });
                pilots.sort();
                return [
                    loc.location_label || '',
                    loc.is_detachment_only ? '1' : '0',
                    pilots.join(','),
                ].join(':');
            }).join('|');
            return `${section.senior_callsign || ''}#${locPart}`;
        }).join('||');
    }

    function applyFlyingHighlights() {
        document.querySelectorAll('#operatorsTvInner [data-callsign]').forEach((cell) => {
            const callsign = cell.dataset.callsign || '';
            const flying = isPilotFlying(callsign);
            const isDet = cell.classList.contains('det-pilot');
            cell.classList.toggle('cell-name--flying', flying && !isDet);
            cell.classList.toggle('det-pilot--flying', flying && isDet);
            let dot = cell.querySelector(':scope > .pilot-flying-dot');
            if (flying && !dot) {
                cell.insertAdjacentHTML('afterbegin', '<span class="pilot-flying-dot" aria-hidden="true"></span>');
            } else if (!flying && dot) {
                dot.remove();
            }
        });
    }

    function applyDashboardData(data, { force = false } = {}) {
        commLinkChoices = data.comm_link_choices || [];
        activePilots = new Set(data.active_pilots || []);
        const structureSig = boardStructureSignature(data);
        const structureChanged = force || structureSig !== lastBoardSignature;

        if (structureChanged) {
            lastBoardSignature = structureSig;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            var inner = document.getElementById('operatorsTvInner');
            inner.innerHTML = renderBoard(data.board);
            inner.style.display = 'block';
            applyFlyingHighlights();
            if (isTvModeActive()) {
                stopTvScrollAnimation();
            }
            requestAnimationFrame(function () {
                if (isTvModeActive()) {
                    setupTvScrollAnimation(0);
                }
            });
        } else {
            applyFlyingHighlights();
        }
    }

    var tvScrollTimer = null;
    var tvScrollState = null;

    function isTvModeActive() {
        return document.documentElement.classList.contains('tv-mode');
    }

    function getTvScrollContainer() {
        return document.getElementById('operatorsTvScroll');
    }

    function getTvScrollInner() {
        return document.getElementById('operatorsTvInner');
    }

    function measureGapToBottom(viewport, anchor) {
        return anchor.getBoundingClientRect().bottom - viewport.getBoundingClientRect().bottom;
    }

    function measureContentHeight(strip) {
        var total = 0;
        strip.querySelectorAll('.board thead tr, .board tbody tr').forEach(function (row) {
            total += row.getBoundingClientRect().height;
        });
        var anchor = strip.querySelector('#tvScrollAnchor');
        if (anchor) {
            total += Math.max(anchor.getBoundingClientRect().height, 1);
        }
        return total;
    }

    function syncTvViewportHeight() {
        var shell = document.getElementById('operatorsShell');
        var toolbar = shell && shell.querySelector('.dash-toolbar');
        var viewport = getTvScrollContainer();
        if (!shell || !viewport) {
            return 0;
        }
        var shellTop = shell.getBoundingClientRect().top;
        var toolbarHeight = toolbar ? toolbar.getBoundingClientRect().height : 0;
        var height = Math.floor(window.innerHeight - shellTop - toolbarHeight);
        if (height < 120) {
            height = Math.max(120, shell.clientHeight - toolbarHeight);
        }
        viewport.style.height = height + 'px';
        viewport.style.maxHeight = height + 'px';
        viewport.style.flex = '0 0 auto';
        return height;
    }

    function applyPan(strip, pos) {
        if (!strip) {
            return;
        }
        if (pos > 0) {
            strip.style.transform = 'translate3d(0,' + (-pos) + 'px,0)';
        } else {
            strip.style.transform = '';
        }
    }

    function isBoardBottomVisible(viewport, strip) {
        var anchor = strip.querySelector('#tvScrollAnchor');
        return anchor && measureGapToBottom(viewport, anchor) <= 6;
    }

    function calibratePanRange(viewport, strip) {
        var anchor = strip.querySelector('#tvScrollAnchor');
        if (!viewport || !strip || !anchor || viewport.clientHeight <= 0) {
            return 0;
        }

        applyPan(strip, 0);
        viewport.scrollTop = 0;
        void strip.offsetHeight;

        var rangeFromHeight = Math.max(0, Math.ceil(measureContentHeight(strip) - viewport.clientHeight));
        var low = 0;
        var high = Math.max(rangeFromHeight, 400);

        applyPan(strip, high);
        while (measureGapToBottom(viewport, anchor) > 6 && high < 60000) {
            high *= 2;
            applyPan(strip, high);
        }

        for (var i = 0; i < 24; i += 1) {
            var mid = Math.floor((low + high) / 2);
            applyPan(strip, mid);
            if (measureGapToBottom(viewport, anchor) > 6) {
                low = mid + 1;
            } else {
                high = mid;
            }
        }

        var range = Math.max(high, rangeFromHeight, 0);
        applyPan(strip, range);
        while (measureGapToBottom(viewport, anchor) > 6 && range < 60000) {
            range += 24;
            applyPan(strip, range);
        }

        applyPan(strip, 0);
        return range;
    }

    function bindTvScrollUserPause() {
        var box = getTvScrollContainer();
        if (!box || box.dataset.tvUserBound === '1') {
            return;
        }
        box.dataset.tvUserBound = '1';
        var resumeTimer = null;
        function pauseAutoScroll() {
            if (!tvScrollTimer || !tvScrollState || tvScrollState.paused) {
                return;
            }
            var strip = getTvScrollInner();
            tvScrollState.paused = true;
            box.classList.add('operators-tv-scroll--manual');
            applyPan(strip, 0);
            box.scrollTop = tvScrollState.pos || 0;
            clearTimeout(resumeTimer);
            resumeTimer = setTimeout(function () {
                if (!tvScrollState) {
                    return;
                }
                box.classList.remove('operators-tv-scroll--manual');
                box.scrollTop = 0;
                tvScrollState.range = calibratePanRange(box, strip);
                tvScrollState.paused = false;
                applyPan(strip, tvScrollState.pos);
            }, 10000);
        }
        box.addEventListener('wheel', pauseAutoScroll, { passive: true });
        box.addEventListener('touchstart', pauseAutoScroll, { passive: true });
        box.addEventListener('mousedown', pauseAutoScroll);
    }

    function applyOperatorsTvLayout() {
        if (!isTvModeActive()) {
            return;
        }
        var box = getTvScrollContainer();
        var strip = getTvScrollInner();
        if (!box || !strip) {
            return;
        }
        box.classList.remove('operators-tv-scroll--manual');
        applyPan(strip, 0);
        box.scrollTop = 0;
        syncTvViewportHeight();
        void box.offsetHeight;
        if (strip.querySelector('.board')) {
            calibratePanRange(box, strip);
        }
    }

    function clearOperatorsTvLayout() {
        var strip = getTvScrollInner();
        var box = getTvScrollContainer();
        if (strip) {
            applyPan(strip, 0);
        }
        if (box) {
            box.classList.remove('operators-tv-scroll--manual');
            box.scrollTop = 0;
            box.style.height = '';
            box.style.maxHeight = '';
            box.style.flex = '';
        }
    }

    function stopTvScrollAnimation() {
        if (tvScrollTimer) {
            clearInterval(tvScrollTimer);
            tvScrollTimer = null;
        }
        tvScrollState = null;
    }

    function tvScrollTick() {
        if (!tvScrollState || !isTvModeActive()) {
            stopTvScrollAnimation();
            return;
        }
        var viewport = getTvScrollContainer();
        var strip = getTvScrollInner();
        if (!viewport || !strip) {
            return;
        }

        var st = tvScrollState;
        if (st.paused) {
            return;
        }

        if (st.range < 8) {
            return;
        }

        viewport.scrollTop = 0;

        if (st.hold > 0) {
            st.hold -= 1;
            if (st.atBottom) {
                applyPan(strip, st.range);
            }
            if (st.hold === 0 && st.atBottom) {
                applyPan(strip, 0);
                st.pos = 0;
                st.atBottom = false;
                st.hold = 120;
            }
            return;
        }

        st.pos += st.step;
        if (st.pos > st.range) {
            st.pos = st.range;
        }
        applyPan(strip, st.pos);

        if (isBoardBottomVisible(viewport, strip) || st.pos >= st.range) {
            applyPan(strip, st.range);
            st.pos = st.range;
            st.atBottom = true;
            st.hold = 90;
        }
    }

    function startTvScrollAnimation() {
        if (!isTvModeActive()) {
            return false;
        }
        var viewport = getTvScrollContainer();
        var strip = getTvScrollInner();
        if (!viewport || !strip || !strip.querySelector('.board')) {
            return false;
        }

        applyOperatorsTvLayout();
        var range = calibratePanRange(viewport, strip);
        if (range < 8) {
            return false;
        }

        stopTvScrollAnimation();
        bindTvScrollUserPause();
        applyPan(strip, 0);
        viewport.scrollTop = 0;
        tvScrollState = {
            range: range,
            step: 1,
            pos: 0,
            atBottom: false,
            paused: false,
            hold: 60,
        };
        tvScrollTick();
        tvScrollTimer = setInterval(tvScrollTick, 33);
        return true;
    }

    function setupTvScrollAnimation(attempt) {
        if (typeof attempt !== 'number') {
            attempt = 0;
        }
        if (!isTvModeActive()) {
            stopTvScrollAnimation();
            clearOperatorsTvLayout();
            return;
        }
        if (tvScrollTimer) {
            return;
        }
        if (startTvScrollAnimation()) {
            return;
        }
        if (attempt < 80) {
            setTimeout(function () { setupTvScrollAnimation(attempt + 1); }, 250);
        }
    }

    window.applyOperatorsTvLayout = applyOperatorsTvLayout;
    window.clearOperatorsTvLayout = clearOperatorsTvLayout;
    window.setupOperatorsTvScroll = function (forceRestart) {
        if (forceRestart) {
            stopTvScrollAnimation();
            clearOperatorsTvLayout();
        } else if (tvScrollTimer) {
            return;
        }
        requestAnimationFrame(function () {
            requestAnimationFrame(function () {
                setupTvScrollAnimation(0);
            });
        });
    };
    window.stopOperatorsTvScroll = function () {
        stopTvScrollAnimation();
        clearOperatorsTvLayout();
    };

    function onTvModeChanged(enabled) {
        if (enabled) {
            window.setupOperatorsTvScroll(true);
            return;
        }
        stopTvScrollAnimation();
        clearOperatorsTvLayout();
    }

    window.addEventListener('rubicon-tv-mode', function (event) {
        onTvModeChanged(Boolean(event.detail && event.detail.enabled));
    });
    window.addEventListener('resize', function () {
        if (!isTvModeActive() || !tvScrollState) {
            return;
        }
        var viewport = getTvScrollContainer();
        var strip = getTvScrollInner();
        if (!viewport || !strip) {
            return;
        }
        syncTvViewportHeight();
        var range = calibratePanRange(viewport, strip);
        if (range > 1) {
            tvScrollState.range = range;
            if (tvScrollState.atBottom) {
                applyPan(strip, range);
                tvScrollState.pos = range;
            } else {
                if (tvScrollState.pos > range) {
                    tvScrollState.pos = range;
                }
                applyPan(strip, tvScrollState.pos);
            }
        }
    });
    document.addEventListener('fullscreenchange', function () {
        if (isTvModeActive()) {
            window.setupOperatorsTvScroll(true);
        }
    });

    function setDashboardErrorVisible(visible) {
        var errorEl = document.getElementById('error');
        if (errorEl) {
            errorEl.style.display = visible ? 'block' : 'none';
        }
    }

    async function loadDashboard({ force = false } = {}) {
        try {
            const response = await fetch('/api/operators/dashboard/?_=' + Date.now(), {
                credentials: 'same-origin',
                cache: 'no-store',
            });
            if (!response.ok) {
                throw new Error('HTTP ' + response.status);
            }
            const data = await response.json();
            dashboardLoadedOnce = true;
            dashboardFetchFailures = 0;
            dashboardFetchWarned = false;
            applyDashboardData(data, { force });
        } catch (err) {
            dashboardFetchFailures += 1;
            document.getElementById('loading').style.display = 'none';
            if (!dashboardLoadedOnce) {
                setDashboardErrorVisible(true);
                console.error(err);
                return;
            }
            setDashboardErrorVisible(false);
            if (!dashboardFetchWarned) {
                console.warn('Не удалось обновить сводную, показываем последние данные:', err);
                dashboardFetchWarned = true;
            }
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateMskClock();
        setInterval(updateMskClock, 1000);
        if (isTvModeActive()) {
            window.setupOperatorsTvScroll(true);
        }
        loadDashboard({ force: true }).then(function () {
            if (isTvModeActive()) {
                window.setupOperatorsTvScroll(true);
            }
        });
        setInterval(() => loadDashboard(), REFRESH_MS);
    });
</script>
