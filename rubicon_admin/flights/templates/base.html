<!-- templates/base.html -->
<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>{% block title %}{{ PORTAL_SITE_NAME }}{% endblock %}</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% include 'includes/navigation_head.html' %}

    <!-- Общие стили страницы -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }

        .content {
            padding: 20px;
            min-height: calc(100vh - 60px);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'includes/navigation.html' %}

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
