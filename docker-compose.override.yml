# Локальный запуск на Windows: http://localhost:8888
services:
  webserver:
    ports:
      - "8888:80"
    volumes:
      - static_volume:/code/static:rw
      - ./nginx/conf.d/default.local.conf:/etc/nginx/conf.d/default.conf:ro

  redis:
    ports:
      - "6380:6379"

  api:
    environment:
      CSRF_COOKIE_SECURE: "False"
      SESSION_COOKIE_SECURE: "False"
