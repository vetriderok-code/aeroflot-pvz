services:
  # Отдельный rubicon_tg_bot не нужен — бот: Rubikon/telegram-bot (aviasales-telegram-bot)
  tg-bot:
    profiles: ["legacy-bot"]
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - ./.env
    environment:
      - TZ=Europe/Moscow
    container_name: rubicon_tg_bot
    restart: "no"
    entrypoint: ["python", "manage.py", "run_telegram_bot"]
    working_dir: /code
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    volumes:
      - ./rubicon_admin:/code:rw
      - ./tg_bot:/code/tg_bot:rw
      - ./video_files:/code/static/video:rw
    networks:
      - app_network

  # Local Bot API — снимает лимит 20 МБ на скачивание видео (нужны TELEGRAM_API_ID/HASH).
  telegram-bot-api:
    profiles: ["bot-api"]
    image: aiogram/telegram-bot-api:latest
    container_name: rubicon-telegram-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api
    networks:
      - app_network

  webserver:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: rubicon-gateway
    restart: always
    environment:
      - TZ=Europe/Moscow
    volumes:
      - static_volume:/code/static:rw
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    ports:
      - "80:80" # HTTP
      - "443:443" # HTTPS
    depends_on:
      - api
    networks:
      - app_network

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: rubicon-api
    restart: always
    volumes:
      - ./rubicon_admin:/code:rw
      - ./tg_bot:/code/tg_bot:ro
      - static_volume:/code/static:rw
      - ./video_files:/code/static/video:rw
      - /mnt/data/share/Gerasimenko:/data/Gerasimenko:ro
    env_file:
      - ./.env
    environment:
      - TZ=Europe/Moscow
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app_network

  database:
    image: postgres:17-alpine
    container_name: rubicon-db
    restart: always
    volumes:
      - content_db:/var/lib/postgresql/data/
      # - ./database_dump.sql:/docker-entrypoint-initdb.d/init.sql  # Раскомментируйте, если есть дамп БД
    env_file:
      - ./.env
    environment:
      - TZ=Europe/Moscow
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'",
        ]
      interval: 15s
      timeout: 30s
      retries: 3
    networks:
      - app_network

  redis:
    image: redis:7.4-alpine
    container_name: redis
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    ports:
      - "6379:6379"
    volumes:
      - ./.redis_data:/data
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    networks:
      - app_network

volumes:
  content_db:
  static_volume:
  telegram_bot_api_data:

networks:
  app_network:
    name: app_network
